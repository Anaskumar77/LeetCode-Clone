server.port=8081
spring.application.name=clone

admin.secret=IAMADMIN


jwt.secret=mySuperSecretKeyForJwtTokenGeneration
jwt.expiration=86400000
jwt.refresh-expiration=604800000

spring.datasource.url=jdbc:postgresql://localhost:5432/springbootleetcode
spring.datasource.username=postgres
